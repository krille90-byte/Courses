<!DOCTYPE html>
<html lang="sv">
    <head>
        <meta charset="utf-8">
        <title>Tic-Tac-Toe</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
        <style> /* sorry, styling is nice :) */
            td {
                width: 125px; 
                height: 125px; 
                border: 1px solid darkgray; 
                font-size: 50px; 
                text-align: center;
                transition: .1s all ease-in-out;
                user-select: none; /* no selecting the X and O! */
            }
            body, main { padding: 20px; }
            main {
                border: 2px solid #d1d1d1;
                border-radius: 12px;
                box-shadow: 0px 0px 15px 2px #d1d1d1;
            }
            td:hover {
                box-shadow: inset 0px 0px 19px 5px rgba(0, 0, 0, 0.33); /* outer box shadow has z-index problems :( */
            }
            label { margin: 8px 0 4px 0; }
            .mt-5 { margin-top: 2rem !important; } /* importanter */
            #timeryesplease { margin: 4px 4px 0 16px; }
            #snyggtimerlabel {
                font-size: 11pt;
                margin: 0;
            }
            @media (prefers-color-scheme: dark) {
                body {
                    background-color: #000;
                    color: #fff;
                }
                main {
                    background-color: #161616;
                    border: 2px solid #262626;
                    box-shadow: none;
                }
                .jumbotron { background-color: #262626 !important; }
                input[type=text], input[type=color] {
                    background-color: #000;
                    border: 1px solid #262626;
                }
                input[type=text]:focus, input[type=color]:focus { background-color: #161616; }
                td { border: 1px solid #000; }
            }
        </style>
    </head>
    <body>
        <main class="container">
            <div class="jumbotron text-center">
                <h1>TicTacToe</h1>
                <p id="errorMsg">Fyll i nicknames samt färg och börja spela!</p>
            </div>
            <form> 
                <div id="divInForm" class="mt-5 row">
                    <div class="col-6">
                        <label for="nick1">Nickname spelare 1:</label>
                        <input type="text" id="nick1" placeholder="nickname" class="form-control" title="nickname för spelare 1">
                    </div>
                    <div class="col-6">
                        <label for="nick2">Nickname spelare 2:</label>
                        <input type="text" id="nick2" placeholder="nickname" class="form-control" title="nickname för spelare 2">
                    </div>
                    <div class="col-6">
                        <label for="color1">Färg spelare 1:</label>
                        <input type="color" id="color1" value="#FFFFFF" placeholder="nickname" class="form-control" title="färg för spelare 1">
                    </div>
                    <div class="col-6">
                        <label for="color2">Färg spelare 2:</label>
                        <input type="color" id="color2" value="#FFFFFF" placeholder="nickname" class="form-control" title="färg för spelare 2">
                    </div>
                    <div id="divWithA" class="col-12 text-right mt-5">
                        <a href="#" id="newGame" class="btn btn-primary btn-xl">Starta spelet!</a>
                    </div>              
                </div>
            </form>

            <!-- Gui för spelplan-->
            <div id="gameArea" class="gameArea">
                <!-- Varje tabell-cell(td) märks med attributet data-id 
                    som motsvarar vektor-index i gameField -->
                <table class="ml-auto mr-auto">
                    <tr>                
                        <td data-id='0'> </td>
                        <td data-id='1'> </td>
                        <td data-id='2'> </td>
                    </tr>
                    <tr>
                        <td data-id='3'> </td>
                        <td data-id='4'> </td>
                        <td data-id='5'> </td>
                    </tr>
                    <tr>
                        <td data-id='6'> </td>
                        <td data-id='7'> </td>
                        <td data-id='8'> </td>
                    </tr>
                </table>
            </div>
        </main>
        <script src="JSFunctions.js"></script>
    </body>
</html>
